<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<HTML>
<HEAD>
<TITLE>CHIPP</TITLE>
<META NAME="Generator" CONTENT="EditPlus">

<META NAME="Description" CONTENT="">
<style>
html, body {
    height: 100%;
    padding: 0;
    margin: 0;
    background: rgba(0, 0, 0, 0.851);
    overflow: hidden; /* prevent scrollbars if canvas shifts slightly */
}

canvas {
    position: absolute;
    width: 100%;
    height: 100%;
    display: block;
    top: 0;
    left: 0;
}

/* Container for the text overlay - centered beautifully */
.text-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    text-align: center;
    pointer-events: none; /* allows clicking through to canvas if needed */
    font-family: 'Great Vibes', 'Dancing Script', 'Pacifico', 'Brush Script MT', cursive, 'Segoe UI', 'Arial', sans-serif;
    text-shadow: 0 0 20px rgba(255, 80, 120, 0.9), 0 0 35px rgba(255, 40, 60, 0.7), 2px 2px 12px rgba(0,0,0,0.4);
    animation: gentleGlow 2.2s ease-in-out infinite alternate;
}

.main-name {
    font-size: 6.5rem;
    font-weight: bold;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #ff758c);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: none; /* override for gradient clarity, but keep outer glow? We'll use drop-shadow via filter */
    filter: drop-shadow(0 0 12px rgba(255, 80, 120, 0.7));
    animation: textFloat 3s infinite alternate ease-in-out;
}

/* Small subtitle or decorative heart */
.sub-love {
    font-size: 1.3rem;
    letter-spacing: 2px;
    margin-top: -15px;
    color: #ffb7c5;
    font-weight: 400;
    text-shadow: 0 0 8px #ff3366;
    opacity: 0.9;
    font-family: 'Segoe UI', 'Arial', sans-serif;
}

@keyframes gentleGlow {
    0% {
        filter: drop-shadow(0 0 5px rgba(255, 80, 120, 0.5));
        transform: translate(-50%, -50%) scale(1);
    }
    100% {
        filter: drop-shadow(0 0 25px rgba(255, 40, 80, 0.9));
        transform: translate(-50%, -50%) scale(1.02);
    }
}

@keyframes textFloat {
    0% {
        transform: translateY(0px);
    }
    100% {
        transform: translateY(-8px);
    }
}

/* Responsive: smaller text on mobile */
@media (max-width: 600px) {
    .main-name {
        font-size: 3.5rem;
        letter-spacing: 3px;
    }
    .sub-love {
        font-size: 0.9rem;
        margin-top: -8px;
    }
}

/* Adding a soft radial background behind text to improve readability but still see particles */
.text-overlay::before {
    content: "";
    position: absolute;
    top: -30%;
    left: -30%;
    width: 160%;
    height: 160%;
    background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0) 80%);
    z-index: -1;
    border-radius: 50%;
    pointer-events: none;
}
</style>

<!-- Load Google Font for elegant script look -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
</HEAD>
<BODY>
<div class="box">
    <canvas id="pinkboard"></canvas>
</div>

<!-- ADDED TEXT "Vy" with elegant design and heart context -->
<div class="text-overlay">
    <div class="main-name">Chipp</div>
</div>

<script>
// ======================= ORIGINAL PARTICLE HEART SCRIPT (preserved) =======================
// with added text layer above

var settings = {
    particles: {
        length: 10000,      // maximum amount of particles
        duration: 4,        // particle duration in sec
        velocity: 80,       // particle velocity in pixels/sec
        effect: -1.3,       // play with this for a nice effect
        size: 8,            // particle size in pixels
    },
};

// requestAnimationFrame polyfill
(function(){var b=0;var c=["ms","moz","webkit","o"];for(var a=0;a<c.length&&!window.requestAnimationFrame;++a){window.requestAnimationFrame=window[c[a]+"RequestAnimationFrame"];window.cancelAnimationFrame=window[c[a]+"CancelAnimationFrame"]||window[c[a]+"CancelRequestAnimationFrame"]}if(!window.requestAnimationFrame){window.requestAnimationFrame=function(h,e){var d=new Date().getTime();var f=Math.max(0,16-(d-b));var g=window.setTimeout(function(){h(d+f)},f);b=d+f;return g}}if(!window.cancelAnimationFrame){window.cancelAnimationFrame=function(d){clearTimeout(d)}}}());

/*
* Point class
*/
var Point = (function() {
    function Point(x, y) {
        this.x = (typeof x !== 'undefined') ? x : 0;
        this.y = (typeof y !== 'undefined') ? y : 0;
    }
    Point.prototype.clone = function() {
        return new Point(this.x, this.y);
    };
    Point.prototype.length = function(length) {
        if (typeof length == 'undefined')
            return Math.sqrt(this.x * this.x + this.y * this.y);
        this.normalize();
        this.x *= length;
        this.y *= length;
        return this;
    };
    Point.prototype.normalize = function() {
        var length = this.length();
        this.x /= length;
        this.y /= length;
        return this;
    };
    return Point;
})();

/*
* Particle class
*/
var Particle = (function() {
    function Particle() {
        this.position = new Point();
        this.velocity = new Point();
        this.acceleration = new Point();
        this.age = 0;
    }
    Particle.prototype.initialize = function(x, y, dx, dy) {
        this.position.x = x;
        this.position.y = y;
        this.velocity.x = dx;
        this.velocity.y = dy;
        this.acceleration.x = dx * settings.particles.effect;
        this.acceleration.y = dy * settings.particles.effect;
        this.age = 0;
    };
    Particle.prototype.update = function(deltaTime) {
        this.position.x += this.velocity.x * deltaTime;
        this.position.y += this.velocity.y * deltaTime;
        this.velocity.x += this.acceleration.x * deltaTime;
        this.velocity.y += this.acceleration.y * deltaTime;
        this.age += deltaTime;
    };
    Particle.prototype.draw = function(context, image) {
        function ease(t) {
            return (--t) * t * t + 1;
        }
        var size = image.width * ease(this.age / settings.particles.duration);
        context.globalAlpha = 1 - this.age / settings.particles.duration;
        context.drawImage(image, this.position.x - size / 2, this.position.y - size / 2, size, size);
    };
    return Particle;
})();

/*
* ParticlePool class
*/
var ParticlePool = (function() {
    var particles,
        firstActive = 0,
        firstFree = 0,
        duration = settings.particles.duration;

    function ParticlePool(length) {
        particles = new Array(length);
        for (var i = 0; i < particles.length; i++)
            particles[i] = new Particle();
    }
    ParticlePool.prototype.add = function(x, y, dx, dy) {
        particles[firstFree].initialize(x, y, dx, dy);
        firstFree++;
        if (firstFree == particles.length) firstFree = 0;
        if (firstActive == firstFree ) firstActive++;
        if (firstActive == particles.length) firstActive = 0;
    };
    ParticlePool.prototype.update = function(deltaTime) {
        var i;
        if (firstActive < firstFree) {
            for (i = firstActive; i < firstFree; i++)
                particles[i].update(deltaTime);
        }
        if (firstFree < firstActive) {
            for (i = firstActive; i < particles.length; i++)
                particles[i].update(deltaTime);
            for (i = 0; i < firstFree; i++)
                particles[i].update(deltaTime);
        }
        while (particles[firstActive].age >= duration && firstActive != firstFree) {
            firstActive++;
            if (firstActive == particles.length) firstActive = 0;
        }
    };
    ParticlePool.prototype.draw = function(context, image) {
        var i;
        if (firstActive < firstFree) {
            for (i = firstActive; i < firstFree; i++)
                particles[i].draw(context, image);
        }
        if (firstFree < firstActive) {
            for (i = firstActive; i < particles.length; i++)
                particles[i].draw(context, image);
            for (i = 0; i < firstFree; i++)
                particles[i].draw(context, image);
        }
    };
    return ParticlePool;
})();

/*
* Putting it all together
*/
(function(canvas) {
    var context = canvas.getContext('2d'),
        particles = new ParticlePool(settings.particles.length),
        particleRate = settings.particles.length / settings.particles.duration, // particles/sec
        time;

    // get point on heart with -PI <= t <= PI
    function pointOnHeart(t) {
        return new Point(
            160 * Math.pow(Math.sin(t), 3),
            130 * Math.cos(t) - 50 * Math.cos(2 * t) - 20 * Math.cos(3 * t) - 10 * Math.cos(4 * t) + 25
        );
    }

    // creating the particle image using a dummy canvas (heart shape particles)
    var image = (function() {
        var canvas = document.createElement('canvas'),
            context = canvas.getContext('2d');
        canvas.width = settings.particles.size;
        canvas.height = settings.particles.size;
        
        function to(t) {
            var point = pointOnHeart(t);
            point.x = settings.particles.size / 2 + point.x * settings.particles.size / 350;
            point.y = settings.particles.size / 2 - point.y * settings.particles.size / 350;
            return point;
        }
        
        context.beginPath();
        var t = -Math.PI;
        var point = to(t);
        context.moveTo(point.x, point.y);
        while (t < Math.PI) {
            t += 0.01;
            point = to(t);
            context.lineTo(point.x, point.y);
        }
        context.closePath();
        context.fillStyle = '#f50b02';
        context.fill();
        
        var image = new Image();
        image.src = canvas.toDataURL();
        return image;
    })();

    // render animation
    function render() {
        requestAnimationFrame(render);
        var newTime = new Date().getTime() / 1000,
            deltaTime = newTime - (time || newTime);
        time = newTime;
        
        context.clearRect(0, 0, canvas.width, canvas.height);
        
        var amount = particleRate * deltaTime;
        for (var i = 0; i < amount; i++) {
            var pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
            var dir = pos.clone().length(settings.particles.velocity);
            particles.add(canvas.width / 2 + pos.x, canvas.height / 2 - pos.y, dir.x, -dir.y);
        }
        
        particles.update(deltaTime);
        particles.draw(context, image);
    }
    
    function onResize() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
    }
    
    window.onresize = onResize;
    
    setTimeout(function() {
        onResize();
        render();
    }, 10);
})(document.getElementById('pinkboard'));

// Additional tweak: ensure text overlay is always on top and canvas doesn't cover it
// The canvas is absolute but behind because text overlay has higher z-index (20)
// Already done via CSS.
</script>

</BODY>
</HTML>
